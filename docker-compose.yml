services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: devopsboard-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "YourStrong!Passw0rd"
      MSSQL_MEMORY_LIMIT_MB: 1500 # <- Limite la RAM pour éviter le crash code 137
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  api:
    build:
      context: ./backend
    container_name: devopsboard-api
    depends_on:
      - sqlserver
    environment:
      PORT: 4000
      DB_SERVER: sqlserver
      DB_PORT: 1433
      DB_DATABASE: DevOpsBoard
      DB_USER: sa
      DB_PASSWORD: "YourStrong!Passw0rd"
      DB_ENCRYPT: "false"
    ports:
      - "4000:4000"

volumes:
  sqlserver_data: